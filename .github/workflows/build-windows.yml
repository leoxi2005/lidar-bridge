name: Build Windows

# Builds the Windows .exe (installer + portable) on a cloud Windows runner — so you
# can produce a Windows build from a Mac-only machine. Run it from the GitHub
# "Actions" tab (Run workflow) or on every push, then download the artifact.

on:
  workflow_dispatch: {}
  push:
    branches: ["**"]
    paths: ["app/**", ".github/workflows/build-windows.yml"]

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer + portable
        run: npm run dist:win
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: lidar-bridge-windows
          path: |
            app/dist/*.exe
          if-no-files-found: error
