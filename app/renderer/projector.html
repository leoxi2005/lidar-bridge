<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>LiDAR Bridge — Output</title>
<style>
* { box-sizing:border-box; }
html,body { margin:0; height:100%; background:#000; overflow:hidden; cursor:default;
  font-family:'IBM Plex Mono',monospace; color:#cdd4dc; }
canvas#proj { position:absolute; inset:0; width:100%; height:100%; display:block; }
.chrome { position:absolute; left:0; right:0; display:flex; align-items:center; gap:14px; padding:10px 16px;
  background:rgba(8,10,13,0.72); backdrop-filter:blur(6px); z-index:10; font-size:11px; letter-spacing:0.04em; }
.top { top:0; border-bottom:1px solid rgba(255,255,255,0.08); }
.bot { bottom:0; border-top:1px solid rgba(255,255,255,0.08); }
.pill { display:flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.12); }
button { font-family:inherit;font-size:10.5px;letter-spacing:0.04em;height:26px;padding:0 10px;border-radius:5px;
  border:1px solid rgba(255,255,255,0.12);background:#13171c;color:#cdd4dc;cursor:pointer; }
button.on { border-color:rgba(0,229,255,0.5);background:rgba(0,229,255,0.12);color:#cfeef5; }
.hidden { display:none !important; }
input[type=range]{ accent-color:#00e5ff; }
</style>
</head>
<body>
<canvas id="proj"></canvas>
<div class="chrome top" id="topChrome">
  <span style="font-weight:600;color:#e8ecf1">LiDAR<span style="color:#00e5ff">Bridge</span> · OUTPUT</span>
  <span class="pill" id="warpPill"><span style="width:6px;height:6px;border-radius:50%;background:#5b636d"></span><span id="warpPillTxt">RAW METRES</span></span>
  <div style="flex:1"></div>
  <button id="bGrid" class="on">GRID (G)</button>
  <button id="bLabels" class="on">LABELS (L)</button>
  <button id="bTest">TEST (T)</button>
  <button id="bFull">FULLSCREEN (F)</button>
  <button id="bHide">HIDE UI (H)</button>
  <button id="bExit" style="border-color:rgba(255,77,94,0.4);color:#ffc2c9">EXIT (Esc)</button>
</div>
<div class="chrome bot" id="botChrome">
  <span style="color:#5b636d">BRIGHT</span>
  <input id="bright" type="range" min="0.2" max="1" step="0.01" value="1" style="width:160px">
  <span style="flex:1"></span>
  <span style="color:#5b636d" id="dims"></span>
</div>
<script src="./projector.js"></script>
</body>
</html>
